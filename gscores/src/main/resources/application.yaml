server:
  port: 8888
  address: 0.0.0.0

spring:
  application:
    name: gscores
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:gsdb}?reWriteBatchedInserts=true
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:gsuser}
    password: ${DB_PASSWORD:gspassword}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 86400000 # 24 giờ
      cache-null-values: false
      key-prefix: "gscores::"
data:
  file-path: classpath:data/diem_thi_thpt_2024.csv

urls:
  frontend: ${URL_FRONTEND:http://localhost:3000}
  backend: ${URL_BACKEND:http://localhost:8888}
