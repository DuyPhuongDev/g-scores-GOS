services:
  postgres:
    image: postgres:16-alpine
    container_name: gscores-postgres
    environment:
      POSTGRES_USER: gsuser
      POSTGRES_PASSWORD: gspassword
      POSTGRES_DB: gsdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - gscores-network
  redis:
    image: redis:latest
    container_name: gscores-redis
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - gscores-network

  gscores-backend:
    # image: gscores:latest
    build:
      context: ./gscores
      dockerfile: Dockerfile
    container_name: gscores-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gsdb
      DB_USER: gsuser
      DB_PASSWORD: gspassword
      REDIS_HOST: redis
      REDIS_PORT: 6379
      URL_FRONTEND: https://gscores.dphuongdev.io.vn
      URL_BACKEND: https://be-gscores.dphuongdev.io.vn
    depends_on:
      - postgres
      - redis
    networks:
      - gscores-network

  g-scores-ui:
    build:
      context: ./g-scores-ui
      dockerfile: Dockerfile
    container_name: g-scores-ui
    depends_on:
      - gscores-backend
    networks:
      - gscores-network

  cloudflared-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    networks:
      - gscores-network
    depends_on:
      - g-scores-ui
networks:
  gscores-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
